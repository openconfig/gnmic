apiVersion: 1
deleteDatasources:
  - name: ClickHouse
    orgId: 1
datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    orgId: 1
    jsonData:
      defaultDatabase: telemetry
      protocol: native
      server: clab-lab20-clickhouse
      port: 9000
      username: default
      tlsSkipVerify: true
    editable: true
