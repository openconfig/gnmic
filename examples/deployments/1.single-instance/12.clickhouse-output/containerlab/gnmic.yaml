username: admin
password: NokiaSrl1!
skip-verify: true
encoding: ascii
log: true

loader:
  type: docker
  filters:
    - containers:
      - label=clab-node-kind: nokia_srlinux
        label=containerlab: lab20

subscriptions:
  sub1:
    paths:
      - /interface/statistics
    stream-mode: sample
    sample-interval: 10s

outputs:
  clickhouse-output:
    type: clickhouse
    address: clab-lab20-clickhouse:9000
    database: telemetry
    table: gnmic_telemetry
    username: default
    password: default
    batch-size: 1000
    flush-timer: 10s
    create-table: true
    enable-metrics: false
